<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 - 智合医药 ERP 中台</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="login-body">
  <div class="login-page">
    <div class="login-bg">
      <div class="login-bg-shape shape-1"></div>
      <div class="login-bg-shape shape-2"></div>
      <div class="login-bg-shape shape-3"></div>
    </div>

    <div class="login-container">
      <div class="login-brand">
        <div class="login-brand-icon">智</div>
        <h1>智合医药 ERP 中台</h1>
        <p>即时零售 · 全渠道 · GSP 合规管理</p>
        <ul class="login-features">
          <li>美团 / 饿了么 / 京东 三平台对接</li>
          <li>商品 · 库存 · 订单 · 处方 一体化</li>
          <li>门店即时配送运营支撑</li>
        </ul>
      </div>

      <div class="login-card">
        <h2>账号登录</h2>
        <p class="login-subtitle">请输入您的账号和密码</p>

        <form id="login-form" class="login-form">
          <div class="login-field">
            <label for="username">用户名</label>
            <div class="login-input-wrap">
              <span class="login-input-icon">👤</span>
              <input id="username" type="text" placeholder="请输入用户名" value="admin" autocomplete="username" />
            </div>
          </div>

          <div class="login-field">
            <label for="password">密码</label>
            <div class="login-input-wrap">
              <span class="login-input-icon">🔒</span>
              <input id="password" type="password" placeholder="请输入密码" value="admin123" autocomplete="current-password" />
            </div>
          </div>

          <div class="login-field">
            <label for="captcha">验证码</label>
            <div class="login-captcha-row">
              <div class="login-input-wrap">
                <span class="login-input-icon">🛡️</span>
                <input id="captcha" type="text" placeholder="请输入验证码" maxlength="4" />
              </div>
              <div class="login-captcha-img" id="captcha-display" title="点击刷新">A7K9</div>
            </div>
          </div>

          <div class="login-options">
            <label class="login-remember">
              <input type="checkbox" id="remember" checked />
              <span>记住我</span>
            </label>
            <a href="#" class="login-forgot" onclick="return false">忘记密码？</a>
          </div>

          <button type="submit" class="login-btn">登 录</button>
        </form>

        <p class="login-tip">原型演示：任意验证码均可登录，默认进入首页</p>
      </div>
    </div>

    <div class="login-footer">© 2026 智合医药 · ERP 中台 UI 原型</div>
  </div>

  <script src="login.js"></script>
</body>
</html>
