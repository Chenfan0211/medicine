<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智合医药 ERP 中台 - UI 原型（全量）</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">智</div>
        <span class="logo-text">智合医药 ERP</span>
      </div>
      <nav class="sidebar-menu" id="sidebar-menu"></nav>
    </aside>

    <div class="main">
      <header class="header">
        <div class="header-left">
          <button class="btn-icon" id="sidebar-toggle" title="收起菜单">«</button>
          <div class="breadcrumb" id="breadcrumb">首页</div>
        </div>
        <div class="header-right">
          <div class="header-bell" title="通知">🔔<span class="dot"></span></div>
          <div class="user-info" id="logout-btn" title="退出登录">
            <div class="avatar" id="user-avatar">管</div>
            <span id="user-name">管理员</span>
            <span style="color:#9ca3af;font-size:12px">⎋</span>
          </div>
        </div>
      </header>

      <main class="content" id="page-container"></main>
    </div>
  </div>

  <div class="prototype-badge">UI 原型 v4.0 · 一期合同 62 项</div>

  <script src="menu-config.js"></script>
  <script src="pages-config.js"></script>
  <script src="phase1-pages.js"></script>
  <script src="data-store.js"></script>
  <script src="phase1-data.js"></script>
  <script src="form-schemas.js"></script>
  <script src="workflow-ui.js"></script>
  <script src="phase1-render.js"></script>
  <script src="phase1-ui.js"></script>
  <script src="entity-render.js"></script>
  <script src="renderer.js"></script>
  <script src="interactions.js"></script>
  <script src="app.js"></script>
</body>
</html>
