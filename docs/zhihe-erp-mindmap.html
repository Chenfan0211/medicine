<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智合医药 ERP 全流程思维导图（详细版）</title>
  <style>
    :root {
      --bg: #f5f6f8;
      --card: #fff;
      --border: #e2e5ea;
      --text: #1a1d21;
      --muted: #5c6570;
      --accent: #2563eb;
      --accent-bg: #eff6ff;
      --purple: #7c3aed;
      --green: #059669;
      --orange: #d97706;
      --pink: #db2777;
      --radius: 8px;
      --font: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      font-size: 14px;
    }
    .wrap { max-width: 1280px; margin: 0 auto; padding: 24px 20px 48px; }
    h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 6px; }
    .subtitle { color: var(--muted); margin-bottom: 20px; }
    .tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
    .tab {
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--card);
      cursor: pointer;
      font-size: 13px;
      transition: all .15s;
    }
    .tab:hover { border-color: var(--accent); }
    .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .panel { display: none; }
    .panel.active { display: block; }
    .callout {
      padding: 14px 18px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: #f0f2f5;
      margin-bottom: 20px;
    }
    .callout strong { display: block; margin-bottom: 4px; }
    .callout p { color: var(--muted); font-size: 13px; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 16px;
      overflow: hidden;
    }
    .card-h {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .card-b { padding: 16px; }
    .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      background: var(--accent-bg);
      color: var(--accent);
    }
    .badge-warn { background: #fef3c7; color: #b45309; }
    .badge-ok { background: #d1fae5; color: #047857; }
    .badge-neutral { background: #f0f2f5; color: var(--muted); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); vertical-align: top; }
    th { background: #f8f9fb; font-weight: 600; white-space: nowrap; }
    tr:nth-child(even) td { background: #fafbfc; }
    .step-list { list-style: none; }
    .step-list li {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 6px 0;
      font-size: 13px;
    }
    .num {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      border-radius: 4px;
      background: #f0f2f5;
      color: var(--muted);
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
    }
    .flow-v { display: flex; flex-direction: column; align-items: center; gap: 0; padding: 8px 0; overflow-x: auto; }
    .flow-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 4px 0; }
    .flow-node {
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #f8f9fb;
      font-size: 12px;
      text-align: center;
      min-width: 100px;
      max-width: 160px;
    }
    .flow-node.highlight { border-color: var(--accent); background: var(--accent-bg); }
    .flow-arrow { color: var(--muted); font-size: 18px; line-height: 1; padding: 2px 0; }
    .flow-label { font-size: 11px; color: var(--muted); margin: 8px 0 4px; text-align: center; width: 100%; }
    .status-chain { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; margin-bottom: 12px; }
    .status-pill {
      padding: 4px 10px;
      border-radius: 4px;
      background: #f0f2f5;
      font-size: 12px;
    }
    .arrow-sm { color: var(--muted); }
    details { margin-bottom: 8px; }
    summary {
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      padding: 8px 0;
      list-style: none;
    }
    summary::-webkit-details-marker { display: none; }
    summary::before { content: "▸ "; color: var(--muted); }
    details[open] summary::before { content: "▾ "; }
    .branch-items { padding-left: 20px; border-left: 2px solid var(--border); margin: 8px 0 12px 8px; }
    .branch-items li { font-size: 13px; padding: 3px 0; color: var(--text); }
    .center-title { text-align: center; padding: 24px; }
    .center-title h2 { font-size: 1.4rem; margin: 8px 0; }
    .color-dot { width: 10px; height: 10px; border-radius: 2px; display: inline-block; margin-right: 6px; }
    .dot-blue { background: var(--accent); }
    .dot-purple { background: var(--purple); }
    .dot-green { background: var(--green); }
    .dot-orange { background: var(--orange); }
    .dot-gray { background: #9ca3af; }
    .footer-note { text-align: center; color: var(--muted); font-size: 12px; margin-top: 32px; }
    @media print {
      .tabs { display: none; }
      .panel { display: block !important; page-break-before: always; }
      .panel:first-of-type { page-break-before: avoid; }
    }
  </style>
</head>

      { id: "m3", dot: "dot-orange", title: "M3 三平台商品库存（16项）", branches: [
        { title: "商品主数据", items: ["SPU/SKU", "医药强校验", "Excel导入", "平台独立定价", "独立上下架", "映射管理"] },
        { title: "库存中心", items: ["真实库存视图", "30秒同步三平台", "5%安全冗余", "流水台账", "盘点"] },
        { title: "订单与防超卖", items: ["平台订单自动回传/拉取", "自动扣减+反向同步", "串行扣减", "30分钟对账"] },
      ]},
      { id: "m4", dot: "dot-gray", title: "M4 基础平台（10项）", branches: [
        { title: "权限审计", items: ["组织架构", "角色权限6种", "数据权限", "操作日志"] },
        { title: "运营支撑", items: ["消息通知", "采购/运营看板", "导出", "参数/SSO/备份"] },
      ]},
    ];

    function esc(s) {
      return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function table(headers, rows) {
      return `<table><thead><tr>${headers.map(h => `<th>${esc(h)}</th>`).join("")}</tr></thead><tbody>${
        rows.map(r => `<tr>${r.map(c => `<td>${esc(c)}</td>`).join("")}</tr>`).join("")
      }</tbody></table>`;
    }

    function stepList(items) {
      return `<ul class="step-list">${items.map((t, i) =>
        `<li><span class="num">${i + 1}</span><span>${esc(t)}</span></li>`
      ).join("")}</ul>`;
    }

    function card(title, body, badge) {
      const badgeHtml = badge ? `<span class="badge">${esc(badge)}</span>` : "";
      return `<div class="card"><div class="card-h"><span>${esc(title)}</span>${badgeHtml}</div><div class="card-b">${body}</div></div>`;
    }

    function flowVertical(layers) {
      return `<div class="flow-v">${layers.map((layer, i) => {
        const nodes = Array.isArray(layer) ? layer : [layer];
        const row = `<div class="flow-row">${nodes.map(n =>
          `<div class="flow-node${n.highlight ? " highlight" : ""}">${esc(n.label || n)}</div>`
        ).join("")}</div>`;
        const arrow = i < layers.length - 1 ? `<div class="flow-arrow">↓</div>` : "";
        return (layer.label ? `<div class="flow-label">${esc(layer.label)}</div>` : "") + row + arrow;
      }).join("")}</div>`;
    }

    function moduleCard(mod) {
      const branches = mod.branches.map(b => `
        <details>
          <summary><span class="color-dot ${mod.dot}"></span>${esc(b.title)} (${b.items.length})</summary>
          <ol class="branch-items">${b.items.map(it => `<li>${esc(it)}</li>`).join("")}</ol>
        </details>
      `).join("");
      return card(mod.title, branches);
    }

    function renderChannelPull() {
      const pullFlow = flowVertical([
        { label: "前置配置" },
        [{ label: "渠道配置" }, { label: "门店映射" }, { label: "商品映射" }],
        { label: "四种拉取入口" },
        [{ label: "美团回调", highlight: true }, { label: "饿了么回调", highlight: true }, { label: "京东回调", highlight: true }],
        [{ label: "定时轮询" }, { label: "拉取美团" }, { label: "拉取饿了么" }, { label: "拉取京东" }, { label: "拉取三渠道" }],
        { label: "平台 API" },
        [{ label: "美团 order API" }, { label: "饿了么 order API" }, { label: "京东 order API" }],
        [{ label: "解析标准化" }, { label: "去重校验" }],
        [{ label: "渠道订单池", highlight: true }],
        [{ label: "扣减/同步库存" }],
        [{ label: "履约作业链" }],
      ]);

      const fulfillFlow = flowVertical([
        [{ label: "美团API/回调" }, { label: "饿了么API/回调" }, { label: "京东API/回调" }],
        [{ label: "拉取订单信息" }],
        [{ label: "渠道订单池", highlight: true }],
        [{ label: "扣减/同步库存" }, { label: "锁单" }, { label: "订单合单" }],
        [{ label: "波次策略" }, { label: "波次生成" }, { label: "合单波次生成" }],
        [{ label: "未请货" }],
        [{ label: "请货(可调数量)" }],
        [{ label: "调ERP接口" }],
        [{ label: "已拣货" }, { label: "回库" }],
        [{ label: "发货地址" }, { label: "生成快递单" }, { label: "打包" }, { label: "打印面单" }],
        [{ label: "出库" }],
        [{ label: "回传ERP出库单" }],
      ]);

      return `
        <div class="callout">
          <strong>三方订单拉取 — 完整链路（重点）</strong>
          <p>美团 / 饿了么 / 京东 订单通过 ①平台回调 ②定时轮询 ③手动拉取（渠道订单池工具栏）④一键拉取三渠道（履约流程页）四种方式进入「渠道订单池 ord-channel-pool」，经解析→去重→写库→扣减库存后，进入锁单→合单→波次→请货→出库履约链。</p>
        </div>
        ${card("三平台拉取数据流（回调 / 轮询 / 手动 / 一键）", pullFlow, "分渠道入口")}
        <div class="grid-3">
          ${card("美团闪购拉取", stepList([
            "回调：POST /api/v1/channel/meituan/callback",
            "手动：渠道订单池 →「拉取美团」",
            "API：order/get · 验签 · 解析 items",
            "映射：MT_POI → 门店 · MT_ITEM → SKU",
            "写入：channelOrders · 状态=已拉取",
          ]), "美团")}
          ${card("饿了么零售拉取", stepList([
            "推送：订单状态变更消息推送",
            "手动：渠道订单池 →「拉取饿了么」",
            "API：order.detail · 消息验签",
            "映射：ELM_ → 门店 · ELM_ITEM → SKU",
            "写入：channelOrders · 状态=已拉取",
          ]), "饿了么")}
          ${card("京东到家拉取", stepList([
            "Webhook：新订单/取消事件",
            "手动：渠道订单池 →「拉取京东」",
            "API：order/es/query · Webhook 验签",
            "映射：JD 门店/商品 ID → 中台",
            "写入：channelOrders · 状态=已拉取",
          ]), "京东")}
        </div>
        ${card("拉取触发入口对照（UI 按钮 → 代码 → 页面）", table(
          ["触发方式", "页面 ID", "按钮/入口", "渠道", "频率", "说明"],
          PULL_TRIGGERS.map(r => [r.trigger, r.page, r.button, r.channel, r.freq, r.desc])
        ), "M3-4-1")}
        ${card("拉取内部处理步骤（API → 订单池 → 库存）", table(["步骤", "节点", "详细说明"], PULL_INTERNAL_STEPS))}
        ${card("平台原始字段 → 渠道订单池字段映射", table(["业务字段", "平台原始字段", "中台字段", "示例值", "备注"], ORDER_FIELD_MAP), "channelOrders")}
        ${card("拉取后校验与异常分支", table(["触发条件", "系统动作", "跳转页面"], PULL_BRANCHES))}
        ${card("三平台 → 拉取 → 订单池 → 履约（总流程图）", fulfillFlow, "履约总览")}
        <div class="grid-2">
          ${CHANNEL_PULL_STAGES.map(s => card(s.stage, stepList(s.steps) + `<p style="margin-top:10px;font-size:12px;color:var(--muted)">UI：${esc(s.ui)}</p>`)).join("")}
        </div>
        ${card("三平台拉取方式对照", table(
          ["渠道", "对接方式", "手动拉取按钮", "自动回传", "配置页"],
          [
            ["美团闪购", "Open API + 订单回调", "拉取美团", "平台推送 → /channel/meituan/callback", "chn-config"],
            ["饿了么零售", "Open API + 消息推送", "拉取饿了么", "订单状态变更推送", "chn-config"],
            ["京东到家", "Open API + Webhook", "拉取京东", "新订单/取消事件推送", "chn-config"],
          ]
        ))}
        ${card("菜单导航路径（原型 UI）", stepList([
          "订单履约 → 渠道订单池（ord-channel-pool）— 拉取美团/饿了么/京东 · 锁单 · 自动合单 · 生成波次",
          "订单履约 → 履约流程（ord-workflow）— 拉取三渠道订单 · pipeline 可视化 · 快捷操作",
          "订单履约 → 渠道配置（chn-config）— 三平台 App Key/Secret/回调 URL",
          "订单履约 → 门店映射（chn-store-map）— 中台门店 ↔ 平台门店 ID",
          "订单履约 → 商品映射（chn-product-map）— 中台 SKU ↔ 平台商品 ID",
          "M3 平台商品库存 → 真实库存 / 库存同步 — 拉取后扣减与反向同步",
        ]))}
      `;
    }

    function renderFulfillDetail() {
      const groups = FULFILL_PIPELINE.map(g => card(g.group, table(
        ["步骤", "节点", "说明", "UI 位置", "分支/操作"], g.items
      ))).join("");
      const status = `<div class="status-chain">
        ${["已拉取","→","已锁单","→","已合单","→","波次中","→","未请货","→","已请货","→","已拣货","→","已出库"].map(s =>
          s === "→" ? `<span class="arrow-sm">→</span>` : `<span class="status-pill">${esc(s)}</span>`
        ).join("")}
      </div>
      <p style="font-size:13px;color:var(--muted)">异常分支：未请货/已请货/异常 → 回库 → 已回库；已拣货前需先生成快递单才能出库</p>`;
      return `
        <div class="callout">
          <strong>履约全流程逐步明细</strong>
          <p>从拉取三方订单开始，经锁单/合单/波次/请货/拣货/发货/出库，至 ERP 回传。与 UI「履约流程」页 pipeline 一一对应。</p>
        </div>
        ${groups}
        ${card("状态流转（渠道订单 → 波次明细）", status)}
      `;
    }

    function renderOverview() {
      return `
        <div class="card"><div class="card-b center-title">
          <span class="badge">一期 62项 + 三方订单履约</span>
          <h2>智合医药 ERP + 中台</h2>
          <p style="color:var(--muted)">采购 · 补货 · 上架 · 库存 · 拉取三方订单 · 履约出库</p>
        </div></div>
        <div class="grid-2">${MODULES.map(moduleCard).join("")}</div>
      `;
    }

    function renderE2E() {
      const e2eFlow = flowVertical([
        [{ label: "三平台对接配置" }],
        [{ label: "门店/商品映射" }],
        [{ label: "商品上架同步" }],
        [{ label: "库存推送三平台" }],
        [{ label: "拉取美团订单", highlight: true }, { label: "拉取饿了么订单", highlight: true }, { label: "拉取京东订单", highlight: true }],
        [{ label: "渠道订单池", highlight: true }],
        [{ label: "扣减/防超卖" }],
        [{ label: "锁单/合单" }],
        [{ label: "波次/请货/拣货" }],
        [{ label: "快递/出库" }],
        [{ label: "ERP出库回传" }],
        { label: "— 进货补货链（并行） —" },
        [{ label: "销量归集(M2)" }, { label: "补货建议" }, { label: "采购入库(M1)" }],
        [{ label: "库存推送三平台（闭环）" }],
      ]);
      return `
        <div class="callout">
          <strong>端到端主链路（含三方拉单）</strong>
          <p>平台对接 → 三渠道拉单 → 订单池 → 履约 → ERP；下方为进货补货闭环。</p>
        </div>
        ${card("跨模块流程（含美团/饿了么/京东拉取节点）", e2eFlow)}
        <div class="grid-3">
          ${card("三方拉单", stepList(["渠道配置", "门店/商品映射", "拉取美团", "拉取饿了么", "拉取京东", "渠道订单池", "扣减/同步库存"]))}
          ${card("进货 M2→M1", stepList(["销量归集", "补货建议", "转采购", "入库", "三单比对"]))}
          ${card("履约出库", stepList(["锁单/合单", "波次/请货", "拣货/回库", "快递/出库", "ERP回传"]))}
        </div>
      `;
    }

    function renderModule(id) {
      const mod = MODULES.find(m => m.id === id);
      return mod ? moduleCard(mod) : "";
    }

    const RENDERERS = {
      "channel-pull": renderChannelPull,
      "fulfill-detail": renderFulfillDetail,
      "overview": renderOverview,
      "e2e": renderE2E,
      "m1": () => renderModule("m1"),
      "m2": () => renderModule("m2"),
      "m3": () => renderModule("m3"),
    };

    let currentView = "channel-pull";

    function switchView(key) {
      currentView = key;
      document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.key === key));
      document.querySelectorAll(".panel").forEach(p => p.classList.toggle("active", p.id === "panel-" + key));
      location.hash = key;
    }

    function init() {
      const tabsEl = document.getElementById("tabs");
      VIEWS.forEach(v => {
        const btn = document.createElement("button");
        btn.className = "tab" + (v.key === currentView ? " active" : "");
        btn.dataset.key = v.key;
        btn.textContent = v.label;
        btn.type = "button";
        btn.addEventListener("click", () => switchView(v.key));
        tabsEl.appendChild(btn);

        const panel = document.getElementById("panel-" + v.key);
        panel.innerHTML = RENDERERS[v.key]();
      });

      const hash = location.hash.replace("#", "");
      if (VIEWS.some(v => v.key === hash)) switchView(hash);
      else document.getElementById("panel-channel-pull").classList.add("active");
    }

    init();
  </script>
</body>
</html>
